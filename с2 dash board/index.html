<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Hosting C2 Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #00ff88;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 2em;
            color: #00ff88;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .status-badge.online {
            background: #00ff88;
            color: #0a0a0a;
        }
        
        .status-badge.offline {
            background: #ff4444;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
        }
        
        .stat-card .label {
            color: #888;
            margin-top: 5px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
        }
        
        .info-card h3 {
            margin-bottom: 15px;
            color: #00ff88;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #888;
        }
        
        .info-value {
            color: #00ff88;
            font-family: monospace;
        }
        
        .log {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #333;
            font-family: monospace;
            color: #888;
        }
        
        .log-entry .timestamp {
            color: #666;
            margin-right: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .auth-form {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        
        .auth-form h2 {
            margin-bottom: 20px;
            color: #00ff88;
        }
        
        .auth-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #2a2a2a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 1em;
        }
        
        .auth-form button {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        
        .auth-form button:hover {
            background: #00cc66;
        }
        
        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Страница авторизации -->
        <div id="auth-page" class="auth-form">
            <h2>🔐 Zero-Hosting C2</h2>
            <input type="password" id="auth-key" placeholder="Ключ доступа" autofocus>
            <button onclick="login()">Войти</button>
        </div>
        
        <!-- Основная панель -->
        <div id="dashboard" class="hidden">
            <header>
                <h1>🔮 Zero-Hosting C2</h1>
                <div>
                    <span id="connection-status" class="status-badge offline">Offline</span>
                    <button class="logout-btn" onclick="logout()" style="margin-left: 10px;">Выйти</button>
                </div>
            </header>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" id="total-bots">0</div>
                    <div class="label">Всего ботов</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="active-bots">0</div>
                    <div class="label">Активных ботов</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="total-commands">0</div>
                    <div class="label">Всего команд</div>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-card">
                    <h3>ℹ️ Информация о системе</h3>
                    <div class="info-row">
                        <span class="info-label">Версия Worker</span>
                        <span class="info-value" id="worker-version">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Uptime</span>
                        <span class="info-value" id="worker-uptime">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Последнее обновление</span>
                        <span class="info-value" id="last-update">-</span>
                    </div>
                </div>
                
                <div class="info-card">
                    <h3>📡 Каналы связи</h3>
                    <div class="info-row">
                        <span class="info-label">Cloudflare Worker</span>
                        <span class="info-value">✅ Активен</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Telegram Bot</span>
                        <span class="info-value">✅ Активен</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">IPFS (Pinata)</span>
                        <span class="info-value">✅ Активен</span>
                    </div>
                </div>
            </div>
            
            <div class="info-card">
                <h3>📋 Последние команды</h3>
                <div class="log" id="command-log">
                    <div class="log-entry">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
